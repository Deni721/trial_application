<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
    <title>Document</title>
</head>
<body>
    <header class="form">

    
        <div class="container-form">
            <h1>Registration User</h1>
            
        <form action="" class="form" data-form>


       <label for="name">Name:</label>  
       <input type="text" id="name" name="name" data-form-name required  class="input-form">

       <label for="citi">Citi:</label>
       <input type="text" id="citi" name="citi" data-form-city required   class="input-form">

       <label for="email">Email:</label>
       <input type="email" id="email" name="email" required data-form-email class="input-form">
       
       <button type="submit" class="btn-form" data-btn-form>Send Form</button>
    
       </form>

    </div>

    </header>
<hr>

<main>
<section class="users">

    <div class="container-users" data-container-users>
    </div>
    <dialog data-dialog ></dialog>
</section>


</main>

</body>
</html>
